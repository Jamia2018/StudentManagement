<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Java Full Stack Beginner Project</p>
      <h1>Student Management System</h1>
      <p>Practice CRUD operations with Spring Boot, MySQL, REST APIs, and JavaScript.</p>
    </section>

    <section class="card">
      <h2 id="form-title">Add Student</h2>
      <form id="student-form">
        <input type="hidden" id="student-id" />
        <label>Name <input id="name" type="text" placeholder="Asha Kumar" required /></label>
        <label>Email <input id="email" type="email" placeholder="asha@example.com" required /></label>
        <label>Course <input id="course" type="text" placeholder="Java Full Stack" required /></label>
        <label>Age <input id="age" type="number" min="16" max="60" placeholder="22" required /></label>
        <div class="actions">
          <button type="submit">Save Student</button>
          <button type="button" id="reset-button" class="secondary">Clear</button>
        </div>
      </form>
      <p id="message" role="status"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Students</h2>
        <button id="refresh-button" class="secondary">Refresh</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Age</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="students-table"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
