spring.application.name=student-management-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:student_user}
spring.datasource.password=${DB_PASSWORD:student_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origin=${FRONTEND_ORIGIN:*}
